<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <radialGradient id="sky" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#1a0a3a"/>
      <stop offset="100%" stop-color="#04020e"/>
    </radialGradient>
    <radialGradient id="arch-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ff8c00" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="softglow"><feGaussianBlur stdDeviation="14" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="800" height="500" fill="url(#sky)"/>
  <!-- Stars -->
  <circle cx="80" cy="40" r="1.5" fill="#fff" opacity="0.9"/>
  <circle cx="150" cy="90" r="1" fill="#fff" opacity="0.7"/>
  <circle cx="240" cy="30" r="2" fill="#e0d0ff" opacity="0.8"/>
  <circle cx="520" cy="25" r="1.5" fill="#fff" opacity="0.9"/>
  <circle cx="600" cy="60" r="1" fill="#c0a0ff" opacity="0.8"/>
  <circle cx="680" cy="40" r="2" fill="#fff" opacity="0.7"/>
  <circle cx="420" cy="15" r="1.5" fill="#e8d8ff" opacity="0.9"/>
  <circle cx="700" cy="130" r="1.5" fill="#fff" opacity="0.6"/>
  <!-- Aurora -->
  <ellipse cx="400" cy="80" rx="350" ry="55" fill="#5020a0" opacity="0.12"/>
  <!-- Trunk left -->
  <path d="M0,500 L0,100 Q70,60 110,90 Q150,120 170,180 Q190,260 190,500Z" fill="#150902"/>
  <!-- Trunk right -->
  <path d="M800,500 L800,100 Q730,60 690,90 Q650,120 630,180 Q610,260 610,500Z" fill="#150902"/>
  <!-- Branches -->
  <path d="M0,160 Q80,120 160,150 Q200,160 220,200" stroke="#1e0e04" stroke-width="25" fill="none"/>
  <path d="M800,160 Q720,120 640,150 Q600,160 580,200" stroke="#1e0e04" stroke-width="25" fill="none"/>
  <path d="M0,260 Q100,230 180,260" stroke="#1e0e04" stroke-width="15" fill="none"/>
  <path d="M800,260 Q700,230 620,260" stroke="#1e0e04" stroke-width="15" fill="none"/>
  <!-- Arch glow -->
  <ellipse cx="400" cy="370" rx="170" ry="180" fill="url(#arch-glow)"/>
  <!-- Arch frame -->
  <path d="M250,500 L250,295 Q250,185 400,170 Q550,185 550,295 L550,500Z" fill="#0e0600"/>
  <path d="M272,500 L272,302 Q272,205 400,192 Q528,205 528,302 L528,500Z" fill="#1c0d00"/>
  <!-- Door warm interior glow -->
  <path d="M300,500 L300,320 Q300,248 400,238 Q500,248 500,320 L500,500Z" fill="#3d2008" opacity="0.85"/>
  <!-- Arch carved border -->
  <path d="M250,295 Q250,185 400,170 Q550,185 550,295" stroke="#8a4a10" stroke-width="7" fill="none"/>
  <path d="M253,294 Q253,188 400,173 Q547,188 547,294" stroke="#ffb040" stroke-width="2" fill="none" opacity="0.6"/>
  <!-- Rune dots -->
  <circle cx="335" cy="218" r="5" fill="#ffaa30" filter="url(#glow)" opacity="0.9"/>
  <circle cx="465" cy="218" r="5" fill="#ffaa30" filter="url(#glow)" opacity="0.9"/>
  <circle cx="285" cy="278" r="4" fill="#ff8820" filter="url(#glow)" opacity="0.7"/>
  <circle cx="515" cy="278" r="4" fill="#ff8820" filter="url(#glow)" opacity="0.7"/>
  <!-- Fireflies -->
  <circle cx="350" cy="370" r="3" fill="#ffd700" filter="url(#glow)" opacity="0.9"/>
  <circle cx="445" cy="300" r="2.5" fill="#ffff80" filter="url(#glow)" opacity="0.8"/>
  <circle cx="380" cy="440" r="2" fill="#ffd700" filter="url(#glow)" opacity="0.7"/>
  <circle cx="415" cy="390" r="2.5" fill="#ffe040" filter="url(#glow)" opacity="0.8"/>
  <circle cx="302" cy="410" r="2" fill="#ffd700" filter="url(#glow)" opacity="0.6"/>
  <circle cx="498" cy="420" r="2" fill="#ffe040" filter="url(#glow)" opacity="0.6"/>
  <!-- Glowing roots -->
  <path d="M190,490 Q280,470 330,480 Q390,467 400,470 Q410,467 470,480 Q520,470 610,490" stroke="#5a3410" stroke-width="5" fill="none" opacity="0.7"/>
  <path d="M200,497 Q300,480 360,487 Q390,477 400,480" stroke="#8a5418" stroke-width="2" fill="none" opacity="0.5"/>
</svg>
